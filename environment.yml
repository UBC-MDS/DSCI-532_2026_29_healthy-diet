name: 532-healthy-diet

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11.9

  # Data Handling
  - pandas=2.2.3
  - numpy=1.26.4

  # Visualization
  - plotly=5.24.1

  # Dashboard
  - shiny=1.3.0
  - shinywidgets=0.3.4

  # Development (local only — not needed for deployment)
  - jupyterlab=4.3.3
  - ipykernel=6.29.5

  - pip:
      - kaggle==1.6.17
      - shinywidgets==0.3.4
      - playwright
      - pytest-playwright
